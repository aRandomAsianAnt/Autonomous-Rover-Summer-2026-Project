[env:esp32dev]
platform = espressif32      #Tells PlatformIO to grab the ESP32 toolchain/compiler
board = esp32dev            #Generic ESP32 DevKitC profile
framework = arduino         #Use the Arduino-style API (Serial, pinMode, etc.) rather than raw ESP-IDF
monitor_speed = 115200      #Baud rate for the Serial Monitor (USB debug output)
upload_speed = 921600       #How fast to transfer the compiled binary during flashing